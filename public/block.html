<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blocked website</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="block-body">
    <main id="block-page" class="block-layout" hidden>
      <section class="photo-stage" aria-label="Outdoor photo">
        <div class="photo-badge" aria-label="Blocked site">
          <svg
            class="photo-badge-icon"
            viewBox="0 0 24 24"
            aria-hidden="true"
            focusable="false"
          >
            <circle cx="12" cy="12" r="9" />
            <path d="M6.5 6.5 17.5 17.5" />
          </svg>
          <span>Blocked</span>
        </div>
        <img
          id="outdoor-photo"
          class="outdoor-photo"
          alt=""
          referrerpolicy="no-referrer"
          decoding="async"
        />
      </section>

      <aside class="block-side-panel" aria-label="Blocked website access controls">
        <section class="panel action-panel">
          <p class="eyebrow">Website blocked</p>
          <h1 id="site-name"></h1>
          <p id="lead-text" class="lead">
            You are trying to visit <code id="target-url"></code>.
            Select Bypass when you need temporary access, then write why
            before continuing.
          </p>

          <button
            id="bypass-button"
            type="button"
            aria-controls="reason-form"
            aria-expanded="false"
          >
            Bypass
          </button>

          <form id="reason-form" class="stack" novalidate hidden>
            <label class="field">
              <span>Reason for access</span>
              <textarea
                id="reason-input"
                name="reason"
                rows="5"
                minlength="1"
                required
                placeholder="I need to access this because..."
              ></textarea>
            </label>
            <p id="form-error" class="error" role="alert" hidden></p>
            <button id="continue-button" type="submit">
              Record reason and continue
            </button>
          </form>
        </section>

        <section class="panel history-panel">
          <h2>Recent access reasons</h2>
          <div class="history-scroll" tabindex="0">
            <p id="attempts-empty" class="muted">No reasons recorded yet.</p>
            <ol id="attempts-list" class="attempt-list"></ol>
          </div>
        </section>

        <section class="panel bypass-stats-panel" aria-labelledby="bypass-stats-heading">
          <div class="bypass-stats-header">
            <div>
              <p class="eyebrow">Bypass stats</p>
              <h2 id="bypass-stats-heading">Last 2 weeks</h2>
            </div>
            <div class="bypass-stat-cards" aria-label="Bypasses by period">
              <div class="bypass-stat-card" role="group" aria-label="Bypasses today">
                <span id="bypass-stat-day">0</span>
                <small>Day</small>
              </div>
              <div class="bypass-stat-card" role="group" aria-label="Bypasses this week">
                <span id="bypass-stat-week">0</span>
                <small>Week</small>
              </div>
              <div class="bypass-stat-card" role="group" aria-label="Bypasses this month">
                <span id="bypass-stat-month">0</span>
                <small>Month</small>
              </div>
            </div>
          </div>
          <ol
            id="bypass-graph"
            class="bypass-graph"
            aria-label="Daily bypasses for the last 14 days"
          ></ol>
        </section>
      </aside>
    </main>

    <script type="module" src="block-page.js"></script>
  </body>
</html>
